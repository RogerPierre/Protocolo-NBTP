<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabio Bank | Digital Banking</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --input-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-icon {
            background: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .welcome-card {
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .welcome-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .welcome-card h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .welcome-card p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            color: var(--primary);
        }

        .operations-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 14px 14px 14px 48px;
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-muted);
        }

        #resultado {
            margin-top: 8px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <section class="brand-section">
            <div>
                <div class="logo-container">
                    <div class="logo-icon">
                        <i data-lucide="landmark"></i>
                    </div>
                    <h1>Gabio Bank</h1>
                </div>

                <div class="welcome-card">
                    <h2>Olá, Correntista!</h2>
                    <p>Gerencie suas finanças com segurança e agilidade no Gabio Bank.</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-icon"><i data-lucide="shield-check"></i></div>
                        <div>
                            <p style="font-size: 0.75rem; color: var(--text-muted)">Segurança</p>
                            <p style="font-size: 0.875rem; font-weight: 600">Protocolo GBTP v1.0</p>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i data-lucide="zap"></i></div>
                        <div>
                            <p style="font-size: 0.75rem; color: var(--text-muted)">Status</p>
                            <p style="font-size: 0.875rem; font-weight: 600">Conectado ao Servidor</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 40px;">
                &copy; 2026 Gabio Bank Digital. Todos os direitos reservados.
            </p>
        </section>

        <section class="operations-section">
            <div class="input-group">
                <div class="input-field">
                    <i data-lucide="user"></i>
                    <input type="text" id="accountId" placeholder="ID da Conta Origem">
                </div>
                <div class="input-field">
                    <i data-lucide="users"></i>
                    <input type="text" id="toAccountId" placeholder="ID da Conta Destino (Transferência)">
                </div>
                <div class="input-field">
                    <i data-lucide="dollar-sign"></i>
                    <input type="number" id="value" placeholder="Valor da Operação">
                </div>
            </div>

            <div class="actions-grid">
                <button id="btnSaldo" class="btn btn-primary">
                    <i data-lucide="wallet"></i> Consultar Saldo
                </button>
                <button id="btnDeposito" class="btn btn-secondary">
                    <i data-lucide="arrow-down-circle"></i> Depósito
                </button>
                <button id="btnSaque" class="btn btn-secondary">
                    <i data-lucide="arrow-up-circle"></i> Saque
                </button>
                <button id="btnTransferencia" class="btn btn-secondary" style="grid-column: span 2;">
                    <i data-lucide="send"></i> Realizar Transferência
                </button>
            </div>

            <div id="resultado">
                <div class="empty-state">
                    <i data-lucide="activity" style="width: 32px; height: 32px; opacity: 0.5"></i>
                    <p>Aguardando sua próxima operação...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    <script src="src/GUI/index.ts" type="module"></script>
</body>

</html>
